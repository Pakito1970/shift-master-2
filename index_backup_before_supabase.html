<!DOCTYPE html>
<html lang='it'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover'>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>Pianificazione PAYLOAD</title>
    <script src='https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #38bdf8; --bg: #0b1120; --card: rgba(255,255,255,0.03); 
            --bronzo: #f59e0b; --ambra: #ef4444; --e-blue: #3b82f6; --panna: #f8fafc;
            --glass: rgba(30, 41, 59, 0.4); --border: rgba(255,255,255,0.05); --success: #10b981;
        }
        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Outfit', sans-serif; margin: 0; 
            padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); 
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); 
            padding-left: calc(20px + env(safe-area-inset-left)); 
            padding-right: calc(20px + env(safe-area-inset-right));
            font-weight: 300; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }
        .header-controls { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 20px 25px; background: var(--glass); backdrop-filter: blur(12px); border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--border); }
        h1 { font-size: 26px; margin: 0; font-weight: 500; }
        h1 span { background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        select { background: #4a413e; color: white; border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px; cursor: pointer; font-family: 'Outfit'; font-weight: 500; outline: none; }
        button { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px; cursor: pointer; font-family: 'Outfit'; font-weight: 500; outline: none; transition: 0.2s; }
        button:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
        .btn-admin { background: rgba(56, 189, 248, 0.1); border-color: var(--p); color: var(--p); }
        
        .calendar-container { overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--glass); border-radius: 20px; border: 1px solid var(--border); padding: 15px; }
        table { border-collapse: separate; border-spacing: 1px; width: 100%; }
        th, td { padding: 6px 2px; text-align: center; border-radius: 4px; min-width: 32px; font-size: 15px; transition: 0.2s; }
        th { color: #94a3b8; font-size: 15px; text-transform: uppercase; }
        .sat { background: var(--bronzo) !important; color: white !important; }
        .sun, .fest { background: var(--ambra) !important; color: white !important; }
        
        .staff-name { text-align: left; padding: 8px 10px; font-weight: 500; font-size: 16px; background: transparent !important; color: #f1f5f9; position: sticky; left: 0; z-index: 10; backdrop-filter: blur(10px); border-right: 1px solid var(--border); }
        .service-cell { background: rgba(255,255,255,0.03); font-size: 16px; font-weight: 500; cursor: pointer; position: relative; }
        .service-select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .modified { border: 1px solid var(--p) !important; color: var(--p) !important; background: rgba(56, 189, 248, 0.05); }
        
        .stats-container { margin-top: 20px; background: var(--glass); border-radius: 12px; border: 1px solid var(--border); padding: 15px; max-width: 850px; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .stats-table th, .stats-table td { text-align: center; padding: 10px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stats-table th { color: var(--p); font-weight: 700; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .stats-table th:first-child, .stats-table td:first-child { text-align: left; padding-left: 15px; width: 150px; font-size: 14px; }
        .val-month { display: inline-block; font-size: 17px; font-weight: 700; color: #fff; margin-right: 5px; }
        .val-year { display: inline-block; font-size: 11px; color: var(--success); font-weight: 600; }

        /* Admin Overlay */
        #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 17, 32, 0.98); backdrop-filter: blur(25px); z-index: 2000; display: none; flex-direction: column; padding: 40px; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-tabs { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: #94a3b8; font-size: 16px; font-weight: 500; cursor: pointer; padding: 10px; transition: 0.3s; }
        .tab-btn.active { color: var(--p); border-bottom: 2px solid var(--p); }
        .admin-content { display: none; animation: fadeIn 0.3s ease; }
        .admin-content.active { display: block; }
        .admin-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
        .admin-list-item:last-child { border-bottom: none; }
        .btn-danger { color: #ef4444; border-color: #ef4444; background: rgba(239, 68, 68, 0.05); }
        .history-row { font-size: 13px; color: #cbd5e1; padding: 10px; border-bottom: 1px solid var(--border); font-family: monospace; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .header-controls { flex-direction: column; gap: 15px; text-align: center; } #adminOverlay { padding: 20px; } }
    </style>
</head>
<body>
    <div class='header-controls'>
        <h1>Pianificazione <span>PAYLOAD</span> <img src="satellite_icon.png" alt="Satellite" style="height:38px; vertical-align: middle; margin-left: 10px; filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.4));"></h1>
        <div style='display:flex; gap:12px; align-items:center; flex-wrap: wrap; justify-content: center;'>
            <button onclick="moveMonth(-1)" title="Mese Precedente">&lsaquo;</button>
            <select id="monthSelect" onchange="renderCalendar()"></select>
            <button onclick="moveMonth(1)" title="Mese Successivo">&rsaquo;</button>
            <select id='yearSelect' onchange='renderCalendar()'></select>
            <button onclick='generatePDF()'>Audit Log</button>
            <button onclick='toggleAdmin()' class="btn-admin">⚙️ Gestione Admin</button>
        </div>
    </div>
    <div class='calendar-container'><table id='mainTable'><thead id='calHead'></thead><tbody id='calBody'></tbody></table></div>
    <div class='stats-container'><h3>Riepilogo Statistico</h3><div id='statsBody'></div></div>

    <!-- Admin Overlay -->
    <div id="adminOverlay">
        <div class="admin-header">
            <h1 style="font-size: 32px;">Pannello <span>Amministratore</span></h1>
            <button onclick="toggleAdmin()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 12px; font-weight: 500; cursor: pointer; color: white;">Esci dalla Gestione</button>
        </div>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('users', event)">Gestione Utenti</button>
            <button class="tab-btn" onclick="switchTab('requests', event)">Richieste & Storico</button>
            <button class="tab-btn" onclick="switchTab('import', event)">Importazione Dati</button>
        </div>

        <!-- Tab Utenti -->
        <div id="tab-users" class="admin-content active">
            <div class="admin-card">
                <div style="display: flex; justify-content: space-between; margin-bottom: 20px;">
                    <h3>Elenco Personale</h3>
                    <button onclick="addUser()" style="background: var(--p); color: var(--bg); border: none;">+ Aggiungi Operatore</button>
                </div>
                <div id="staffList"></div>
            </div>
        </div>

        <!-- Tab Richieste -->
        <div id="tab-requests" class="admin-content">
            <div class="admin-card">
                <h3>Log Cronologico delle Modifiche</h3>
                <p style="color: #94a3b8; font-size: 14px; margin-bottom: 15px;">Monitora tutte le richieste di cambio turno effettuate dagli utenti.</p>
                <div id="historyList" style="max-height: 400px; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 8px;"></div>
            </div>
        </div>

        <!-- Tab Import -->
        <div id="tab-import" class="admin-content">
            <div class="admin-card">
                <h3>Importazione Annuale Excel</h3>
                <p style="color: #94a3b8; font-size: 14px; margin-bottom: 20px;">Carica il file Excel per popolare automaticamente i turni di tutto l'anno.</p>
                <button onclick='document.getElementById("excelFile").click()' style="padding: 20px 40px; font-size: 18px; border: 2px dashed var(--p); background: rgba(56, 189, 248, 0.05); width: 100%;">Scegli file Excel (.xlsx)</button>
                <input type='file' id='excelFile' style='display:none' onchange='importExcel(this)'>
            </div>
        </div>
    </div>

    <script>
        const STAFF = ["DI LAURO", "BASILICA", "CARANGIO", "DATTEO"];
        const OPTIONS = ["CFI", "CFI/REP", "REP", "MIX", "RM", "L.O.", "LIC", "—"];
        const MONTHS = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
        let state = { year: 2026, month: new Date().getMonth(), shifts: {}, originalShifts: {}, history: [] };

        const getEaster = (y) => {
            const f = Math.floor, G = y % 19, C = f(y/100), H = (C - f(C/4) - f((8*C+13)/25) + 19*G + 15) % 30, I = H - f(H/28)*(1-f(29/(H+1))*f((21-G)/11)), J = (y + f(y/4) + I + 2 - C + f(C/4)) % 7, L = I - J, m = 3 + f((L+40)/44), d = L + 28 - 31*f(m/4);
            return { m: m - 1, d: d };
        };

        const isHoliday = (d, m, y) => {
            const fixed = ["1-0", "6-0", "20-0", "25-3", "1-4", "2-5", "15-7", "4-9", "1-10", "8-11", "25-11", "26-11"];
            if (fixed.includes(d + '-' + m)) return true;
            const e = getEaster(y); if (d === e.d && m === e.m) return true;
            const mon = new Date(y, e.m, e.d + 1); return (d === mon.getDate() && m === mon.getMonth());
        };

        const isFestive = (ds) => {
            const [y, m, d] = ds.split('-').map(Number);
            return isHoliday(d, m - 1, y) || new Date(y, m - 1, d).getDay() === 0;
        };

        function moveMonth(delta) { 
            let m = parseInt(document.getElementById("monthSelect").value); 
            let y = parseInt(document.getElementById("yearSelect").value); 
            let d = new Date(y, m + delta, 1); 
            document.getElementById("monthSelect").value = d.getMonth(); 
            document.getElementById("yearSelect").value = d.getFullYear(); 
            renderCalendar(); 
        }

        function renderCalendar() {
            state.month = parseInt(document.getElementById('monthSelect').value);
            state.year = parseInt(document.getElementById('yearSelect').value);
            const days = new Date(state.year, state.month + 1, 0).getDate();
            let h1 = "<tr><th class='staff-name'>GIORNO</th>", h2 = "<tr><th class='staff-name'>SETT.</th>";
            for(let d=1; d<=days; d++) {
                const date = new Date(state.year, state.month, d);
                const ds = `${state.year}-${(state.month+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const cls = isFestive(ds) ? "fest" : (date.getDay() === 6 ? "sat" : (date.getDay() === 0 ? "sun" : ""));
                h1 += `<th>${d}</th>`; h2 += `<th class='${cls}'>${["D","L","M","M","G","V","S"][date.getDay()]}</th>`;
            }
            document.getElementById('calHead').innerHTML = h1 + "</tr>" + h2 + "</tr>";

            let bodyHtml = "";
            STAFF.forEach(name => {
                bodyHtml += `<tr><td class='staff-name'>${name}</td>`;
                for(let d=1; d<=days; d++) {
                    const ds = `${state.year}-${(state.month+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                    const val = (state.shifts[ds] && state.shifts[ds][name]) || '—';
                    const isMod = state.originalShifts[ds] && state.originalShifts[ds][name] && state.originalShifts[ds][name] !== val;
                    let optHtml = `<option value=''>Scegli...</option>`;
                    OPTIONS.forEach(o => optHtml += `<option value='${o}'>${o}</option>`);
                    bodyHtml += `<td class='service-cell ${isMod ? 'modified' : ''}'>${val}<select class='service-select' onchange='requestChange("${name}","${ds}", this.value)'>${optHtml}</select></td>`;
                }
                bodyHtml += "</tr>";
            });
            document.getElementById('calBody').innerHTML = bodyHtml;
            renderStats();
            savePersistence();
        }

        function renderStats() {
            const stats = {}; STAFF.forEach(u => stats[u] = { m: {repFer:0, repFest:0, cfi:0, lic:0, mix:0, rm:0}, y: {repFer:0, repFest:0, cfi:0, lic:0, mix:0, rm:0} });
            for (let ds in state.shifts) {
                const parts = ds.split('-').map(Number), y = parts[0], m = parts[1] - 1;
                if (y !== state.year) continue;
                const festive = isFestive(ds), isM = (m === state.month);
                for (let u in state.shifts[ds]) {
                    if (!stats[u]) continue;
                    const val = state.shifts[ds][u]; if (!val || val === '—') continue;
                    const up = (s) => {
                        if (val === 'REP' || val === 'REPF') { if(festive) s.repFest++; else s.repFer++; }
                        else if (val === 'CFI' || val === 'CFI/REP') s.cfi += (festive ? 2 : 1);
                        else if (val === 'LIC' || val === 'L.O.') { if(!festive) s.lic++; }
                        else if (val === 'MIX') s.mix++; else if (val === 'RM') s.rm++;
                    };
                    up(stats[u].y); if (isM) up(stats[u].m);
                }
            }
            let html = "<table class='stats-table'><thead><tr><th>Operatore</th><th>REP (f/F)</th><th>CFI</th><th>LIC/L.O.</th><th>MIX</th><th>RM</th></tr></thead><tbody>";
            STAFF.forEach(u => {
                const s = stats[u];
                html += `<tr><td>${u}</td><td><span class='val-month'>${s.m.repFer}f / ${s.m.repFest}F</span><span class='val-year'>(${s.y.repFer}/${s.y.repFest})</span></td><td><span class='val-month'>${s.m.cfi}</span><span class='val-year'>(${s.y.cfi})</span></td><td><span class='val-month'>${s.m.lic}</span><span class='val-year'>(${s.y.lic})</span></td><td><span class='val-month'>${s.m.mix}</span><span class='val-year'>(${s.y.mix})</span></td><td><span class='val-month'>${s.m.rm}</span><span class='val-year'>(${s.y.rm})</span></td></tr>`;
            });
            document.getElementById('statsBody').innerHTML = html + "</tbody></table>";
        }

        function requestChange(u, d, v) {
            if(!v) return;
            if (v === 'REP' || v === 'REPF') {
                const monthStr = d.substring(0, 7);
                let fer = 0, fest = 0;
                for (let ds in state.shifts) {
                    if (ds.startsWith(monthStr) && ds !== d && (state.shifts[ds][u] === 'REP' || state.shifts[ds][u] === 'REPF')) {
                        if (isFestive(ds)) fest++; else fer++;
                    }
                }
                if (isFestive(d)) fest++; else fer++;
                if (fer > 6 || fest > 2) { 
                    alert(`Limite superato per ${u}: Max 6 feriali e 2 festivi.`); 
                    if(state.shifts[d]) delete state.shifts[d][u];
                    renderCalendar(); return; 
                }
            }
            if(!state.shifts[d]) state.shifts[d] = {};
            state.history.push({ user: u, date: d, from: state.shifts[d][u] || '—', to: v, timestamp: new Date().toLocaleString() });
            state.shifts[d][u] = v; renderCalendar();
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF();
            const pageWidth = doc.internal.pageSize.getWidth();
            doc.setFont("helvetica", "bold"); doc.setFontSize(22); doc.setTextColor(56, 189, 248);
            doc.text("Audit Report - Pianificazione PAYLOAD", 20, 25);
            doc.setFontSize(10); doc.setTextColor(100, 100, 100);
            doc.text(`Generato il: ${new Date().toLocaleString()}`, 20, 32);
            let y = 45;
            const grouped = state.history.reduce((acc, h) => {
                if (!acc[h.user]) acc[h.user] = [];
                acc[h.user].push(h);
                return acc;
            }, {});
            if (Object.keys(grouped).length === 0) {
                doc.setTextColor(150, 150, 150); doc.text("Nessuna modifica registrata.", 20, y);
            } else {
                Object.keys(grouped).forEach(user => {
                    if (y > 260) { doc.addPage(); y = 20; }
                    doc.setFont("helvetica", "bold"); doc.setFontSize(12); doc.setTextColor(30, 41, 59);
                    doc.text(`OPERATORE: ${user}`, 20, y);
                    y += 2; doc.setDrawColor(56, 189, 248); doc.setLineWidth(0.5); doc.line(20, y, pageWidth - 20, y);
                    y += 8; doc.setFont("helvetica", "normal"); doc.setFontSize(10); doc.setTextColor(50, 50, 50);
                    grouped[user].forEach(h => {
                        const row = `${h.date.padEnd(12)} |  Da: ${h.from.padEnd(8)}  ->  A: ${h.to.padEnd(8)}  |  Modificato il: ${h.timestamp}`;
                        doc.text(row, 25, y); y += 7;
                        if (y > 275) { doc.addPage(); y = 20; }
                    });
                    y += 10;
                });
            }
            doc.save(`Audit_Report_PAYLOAD.pdf`);
        }

        function importExcel(input) {
            const reader = new FileReader();
            reader.onload = (e) => {
                const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                const ws = wb.Sheets["ANNO CORRENTE"] || wb.Sheets[wb.SheetNames[0]];
                for(let m=0; m<12; m++) {
                    const rowOff = 4 + (m * 8);
                    for(let s=0; s<STAFF.length; s++) {
                        const row = rowOff + 3 + s;
                        for(let d=1; d<=31; d++) {
                            const cell = ws[XLSX.utils.encode_col(d) + row];
                            if(cell && cell.v) {
                                const ds = `2026-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                                const v = cell.v.toString().toUpperCase().trim();
                                if(!state.shifts[ds]) state.shifts[ds] = {};
                                if(!state.originalShifts[ds]) state.originalShifts[ds] = {};
                                state.shifts[ds][STAFF[s]] = v; state.originalShifts[ds][STAFF[s]] = v;
                            }
                        }
                    }
                }
                renderCalendar();
                alert("Importazione completata con successo!");
                toggleAdmin();
            };
            reader.readAsArrayBuffer(input.files[0]);
        }

        // Admin Logic
        function toggleAdmin() {
            const overlay = document.getElementById('adminOverlay');
            if (overlay.style.display === 'flex') {
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
                renderAdminUsers();
                renderAdminHistory();
            }
        }

        function switchTab(tabId, event) {
            document.querySelectorAll('.admin-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`tab-${tabId}`).classList.add('active');
            event.target.classList.add('active');
        }

        function renderAdminUsers() {
            const list = document.getElementById('staffList');
            list.innerHTML = '';
            STAFF.forEach((name, i) => {
                list.innerHTML += `
                    <div class="admin-list-item">
                        <span><strong>${name}</strong></span>
                        <div>
                            <button onclick="editUser(${i})" style="margin-right:10px">✏️</button>
                            <button onclick="removeUser(${i})" class="btn-danger">🗑️</button>
                        </div>
                    </div>
                `;
            });
        }

        function renderAdminHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = '';
            [...state.history].reverse().forEach(h => {
                list.innerHTML += `<div class="history-row">[${h.timestamp}] ${h.user}: ${h.date} | ${h.from} -> ${h.to}</div>`;
            });
            if(state.history.length === 0) list.innerHTML = `<p style="padding:20px; color:#94a3b8">Nessuna modifica registrata.</p>`;
        }

        function addUser() {
            const name = prompt("Inserisci il nome del nuovo operatore:");
            if (name) {
                STAFF.push(name.toUpperCase().trim());
                renderAdminUsers();
                renderCalendar();
            }
        }

        function removeUser(index) {
            if (confirm(`Rimuovere definitivamente ${STAFF[index]}?`)) {
                STAFF.splice(index, 1);
                renderAdminUsers();
                renderCalendar();
            }
        }

        function editUser(index) {
            const newName = prompt("Modifica nome operatore:", STAFF[index]);
            if (newName) {
                STAFF[index] = newName.toUpperCase().trim();
                renderAdminUsers();
                renderCalendar();
            }
        }

        function savePersistence() {
            localStorage.setItem('payload_staff', JSON.stringify(STAFF));
            localStorage.setItem('payload_shifts', JSON.stringify(state.shifts));
            localStorage.setItem('payload_original', JSON.stringify(state.originalShifts));
            localStorage.setItem('payload_history', JSON.stringify(state.history));
        }

        async function init() {
            const savedStaff = localStorage.getItem('payload_staff');
            if (savedStaff) { STAFF.length = 0; STAFF.push(...JSON.parse(savedStaff)); }
            state.shifts = JSON.parse(localStorage.getItem('payload_shifts') || '{}');
            state.originalShifts = JSON.parse(localStorage.getItem('payload_original') || '{}');
            state.history = JSON.parse(localStorage.getItem('payload_history') || '[]');
            const m = document.getElementById('monthSelect'), y = document.getElementById('yearSelect');
            MONTHS.forEach((mo, i) => m.innerHTML += `<option value='${i}'>${mo}</option>`);
            for(let i=2024; i<=2030; i++) y.innerHTML += `<option value='${i}'>${i}</option>`;
            m.value = state.month; y.value = state.year; renderCalendar();
        }
        init();
    </script>
</body>
</html>
