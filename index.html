<!DOCTYPE html>
<html lang='it'>
<head>
    <meta charset='utf-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0, viewport-fit=cover'>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <title>Pianificazione PAYLOAD</title>
    <script src='https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js'></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --p: #38bdf8; --bg: #0b1120; --card: rgba(255,255,255,0.03); 
            --bronzo: #f59e0b; --ambra: #ef4444; --e-blue: #3b82f6; --panna: #f8fafc;
            --glass: rgba(30, 41, 59, 0.4); --border: rgba(255,255,255,0.05); --success: #10b981;
        }
        body { 
            background: var(--bg); color: #f8fafc; font-family: 'Outfit', sans-serif; margin: 0; 
            padding: 20px; padding-top: calc(20px + env(safe-area-inset-top)); 
            padding-bottom: calc(20px + env(safe-area-inset-bottom)); 
            padding-left: calc(20px + env(safe-area-inset-left)); 
            padding-right: calc(20px + env(safe-area-inset-right));
            font-weight: 300; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale;
        }
        .header-controls { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; padding: 20px 25px; background: var(--glass); backdrop-filter: blur(12px); border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--border); }
        h1 { font-size: 26px; margin: 0; font-weight: 500; }
        h1 span { background: linear-gradient(135deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 800; }
        select { background: #1e293b; color: white; border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px; cursor: pointer; font-family: 'Outfit'; font-weight: 500; outline: none; }
        button { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); padding: 10px 16px; border-radius: 12px; cursor: pointer; font-family: 'Outfit'; font-weight: 500; outline: none; transition: 0.2s; }
        button:hover { background: rgba(255,255,255,0.1); transform: translateY(-1px); }
        .btn-admin { background: rgba(56, 189, 248, 0.1); border-color: var(--p); color: var(--p); }
        
        .calendar-container { overflow-x: auto; -webkit-overflow-scrolling: touch; background: var(--glass); border-radius: 20px; border: 1px solid var(--border); padding: 15px; min-height: 200px; }
        table { border-collapse: separate; border-spacing: 1px; width: 100%; }
        th, td { padding: 6px 2px; text-align: center; border-radius: 4px; min-width: 32px; font-size: 15px; transition: 0.2s; }
        th { color: #94a3b8; font-size: 15px; text-transform: uppercase; }
        .sat { background: var(--bronzo) !important; color: white !important; }
        .sun, .fest { background: var(--ambra) !important; color: white !important; }
        
        .staff-name { text-align: left; padding: 8px 10px; font-weight: 500; font-size: 16px; background: transparent !important; color: #f1f5f9; position: sticky; left: 0; z-index: 10; backdrop-filter: blur(10px); border-right: 1px solid var(--border); }
        .service-cell { background: rgba(255,255,255,0.03); font-size: 16px; font-weight: 500; cursor: pointer; position: relative; }
        .service-select { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 2; }
        .editable-cell { border: 1px dashed rgba(56, 189, 248, 0.3) !important; cursor: pointer; }
        .editable-cell:hover { background: rgba(56, 189, 248, 0.1) !important; border-color: var(--p) !important; }
        .modified { border: 1px solid var(--p) !important; color: var(--p) !important; background: rgba(56, 189, 248, 0.05); }
        
        .stats-container { margin-top: 20px; background: var(--glass); border-radius: 12px; border: 1px solid var(--border); padding: 15px; max-width: 850px; }
        .stats-table { width: 100%; border-collapse: collapse; margin-top: 5px; }
        .stats-table th, .stats-table td { text-align: center; padding: 10px 6px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .stats-table th { color: var(--p); font-weight: 700; font-size: 13px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .stats-table th:first-child, .stats-table td:first-child { text-align: left; padding-left: 15px; width: 150px; font-size: 14px; }
        .val-month { display: inline-block; font-size: 17px; font-weight: 700; color: #fff; margin-right: 5px; }
        .val-year { display: inline-block; font-size: 11px; color: var(--success); font-weight: 600; }

        #adminOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(11, 17, 32, 0.98); backdrop-filter: blur(25px); z-index: 2000; display: none; flex-direction: column; padding: 40px; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .admin-tabs { display: flex; gap: 20px; margin-bottom: 30px; border-bottom: 1px solid var(--border); }
        .tab-btn { background: none; border: none; color: #94a3b8; font-size: 16px; font-weight: 500; cursor: pointer; padding: 10px; transition: 0.3s; }
        .tab-btn.active { color: var(--p); border-bottom: 2px solid var(--p); }
        .admin-content { display: none; animation: fadeIn 0.3s ease; }
        .admin-content.active { display: block; }
        .admin-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .admin-list-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
        .history-row { font-size: 13px; color: #cbd5e1; padding: 10px; border-bottom: 1px solid var(--border); font-family: monospace; }
        
        #loginOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 3000; display: flex; justify-content: center; align-items: center; }
        .login-box { background: var(--glass); padding: 40px; border-radius: 20px; border: 1px solid var(--border); text-align: center; width: 90%; max-width: 400px; }
        .login-box h2 { margin-bottom: 20px; font-weight: 500; }
        .login-box select, .login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 12px; background: #1e293b; color: white; border: 1px solid var(--border); box-sizing: border-box; }
        .login-box button { width: 100%; padding: 12px; background: var(--p); color: #0b1120; font-weight: 800; border: none; font-size: 16px; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .login-box button:hover { opacity: 0.9; transform: translateY(-2px); }
        .pending-request { position: absolute; bottom: 4px; right: 4px; width: 10px; height: 10px; background: var(--bronzo); border-radius: 50%; box-shadow: 0 0 5px var(--bronzo); }
        .admin-btn-action { padding: 6px 12px; font-size: 12px; margin-left: 10px; }
        .btn-approve { background: rgba(16, 185, 129, 0.2); color: var(--success); border-color: var(--success); }
        .btn-reject { background: rgba(239, 68, 68, 0.2); color: var(--ambra); border-color: var(--ambra); }
        .email-config-group { margin-bottom: 15px; text-align: left; }
        .email-config-group label { display: block; margin-bottom: 5px; font-size: 13px; color: #94a3b8; }
        .email-config-group input { width: 100%; padding: 10px; border-radius: 8px; background: #0f172a; border: 1px solid var(--border); color: white; box-sizing: border-box; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-width: 768px) { .header-controls { flex-direction: column; gap: 15px; text-align: center; } #adminOverlay { padding: 20px; } }
    </style>
</head>
<body>
    <div id="loginOverlay">
        <div class="login-box">
            <h2>Accedi al <span>Turnario</span></h2>
            <select id="loginUserSelect"><option value="">Seleziona il tuo nome...</option><option value="ADMIN">⚙️ Amministratore</option></select>
            <input type="password" id="loginPin" placeholder="PIN Admin (es. 1234)" style="display:none;">
            <button onclick="login()">Entra</button>
        </div>
    </div>

    <div class='header-controls'>
        <h1>Pianificazione <span>PAYLOAD</span> <img src="satellite_icon.png" alt="Satellite" style="height:38px; vertical-align: middle; margin-left: 10px; filter: drop-shadow(0 0 8px rgba(56, 189, 248, 0.4));"></h1>
        <div style='display:flex; gap:12px; align-items:center; flex-wrap: wrap; justify-content: center;'>
            <button onclick="moveMonth(-1)" title="Mese Precedente">&lsaquo;</button>
            <select id="monthSelect" onchange="renderCalendar()"></select>
            <button onclick="moveMonth(1)" title="Mese Successivo">&rsaquo;</button>
            <select id='yearSelect' onchange='renderCalendar()'></select>
            <button onclick='generatePDF()'>Audit Log</button>
            <button id="adminBtnMain" onclick='toggleAdmin()' class="btn-admin" style="display:none;">⚙️ Gestione Admin</button>
        </div>
    </div>
    <div class='calendar-container'><table id='mainTable'><thead id='calHead'></thead><tbody id='calBody'></tbody></table></div>
    <div class='stats-container'><h3>Riepilogo Statistico</h3><div id='statsBody'></div></div>

    <div id="adminOverlay">
        <div class="admin-header">
            <h1 style="font-size: 32px;">Pannello <span>Amministratore</span></h1>
            <button onclick="toggleAdmin()" style="background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 10px 25px; border-radius: 12px; font-weight: 500; cursor: pointer; color: white;">Esci dalla Gestione</button>
        </div>
        <div class="admin-tabs">
            <button class="tab-btn active" onclick="switchTab('users', event)">Gestione Utenti</button>
            <button class="tab-btn" onclick="switchTab('requests', event)">Richieste & Storico</button>
            <button class="tab-btn" onclick="switchTab('email', event)">Impostazioni Email</button>
            <button class="tab-btn" onclick="switchTab('import', event)">Importazione Dati</button>
        </div>
        <div id="tab-users" class="admin-content active">
            <div class="admin-card"><h3>Elenco Personale</h3><div id="staffList"></div><button onclick="addUser()">+ Aggiungi Operatore</button></div>
        </div>
        <div id="tab-requests" class="admin-content">
            <div class="admin-card"><h3>Richieste in Attesa</h3><div id="pendingRequestsList">Nessuna richiesta in attesa.</div></div>
            <div class="admin-card"><h3>Log Cronologico</h3><div id="historyList"></div></div>
        </div>
        <div id="tab-email" class="admin-content">
            <div class="admin-card">
                <h3>Configurazione EmailJS</h3>
                <p style="font-size: 13px; color:#94a3b8; margin-bottom: 15px;">Inserisci le credenziali di EmailJS per l'invio automatico dei PDF approvati.</p>
                <div class="email-config-group"><label>Service ID</label><input type="text" id="emailServiceId" placeholder="es. service_abc123"></div>
                <div class="email-config-group"><label>Template ID</label><input type="text" id="emailTemplateId" placeholder="es. template_xyz789"></div>
                <div class="email-config-group"><label>Public Key</label><input type="text" id="emailPublicKey" placeholder="es. abcDEFghi123"></div>
                <div class="email-config-group"><label>Indirizzi Email (separati da virgola)</label><input type="text" id="emailToAddresses" placeholder="es. admin1@email.it, admin2@email.it"></div>
                <button onclick="saveEmailConfig()" class="btn-admin" style="width: 100%; margin-top: 10px;">Salva Configurazione</button>
            </div>
        </div>
        <div id="tab-import" class="admin-content">
            <div class="admin-card"><h3>Importazione Excel</h3><input type='file' id='excelFile' onchange='importExcel(this)'></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://uegpandfgcxycwvzffbv.supabase.co";
        const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVlZ3BhbmRmZ2N4eWN3dnpmZmJ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMjcwMzEsImV4cCI6MjA5MjkwMzAzMX0.xKZbvynKJ1aE1P_t3UQGYiNIACzDk7cP-flhkVdeu-Q";
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let STAFF = ["DI LAURO", "BASILICA", "CARANGIO", "DATTEO"];
        const OPTIONS = ["CFI", "CFI/REP", "REP", "MIX", "RM", "L.O.", "LIC", "—"];
        const MONTHS = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Octobre","Novembre","Dicembre"];
        let state = { year: 2026, month: new Date().getMonth(), shifts: {}, originalShifts: {}, history: [], pendingRequests: [], emailConfig: { serviceId: '', templateId: '', publicKey: '', toEmails: '' }, userRoles: { "DI LAURO": "SUPERUSER", "BASILICA": "USER", "CARANGIO": "USER", "DATTEO": "USER" } };
        let currentUser = null;
        let isAdmin = false;

        document.getElementById('loginUserSelect').addEventListener('change', (e) => {
            const val = e.target.value;
            const isSuper = val === 'ADMIN' || (state.userRoles && state.userRoles[val] === 'SUPERUSER');
            document.getElementById('loginPin').style.display = isSuper ? 'block' : 'none';
        });

        function login() {
            const user = document.getElementById('loginUserSelect').value;
            if(!user) return alert("Seleziona un utente");
            const isSuper = user === 'ADMIN' || (state.userRoles && state.userRoles[user] === 'SUPERUSER');
            if(isSuper) {
                const pin = document.getElementById('loginPin').value;
                if(pin !== '1234') return alert("PIN errato!");
                isAdmin = true;
                currentUser = user;
                document.getElementById('adminBtnMain').style.display = 'inline-block';
            } else {
                isAdmin = false;
                currentUser = user;
                document.getElementById('adminBtnMain').style.display = 'none';
            }
            document.getElementById('loginOverlay').style.display = 'none';
            renderCalendar();
        }

        const getEaster = (y) => {
            const f = Math.floor, G = y % 19, C = f(y/100), H = (C - f(C/4) - f((8*C+13)/25) + 19*G + 15) % 30, I = H - f(H/28)*(1-f(29/(H+1))*f((21-G)/11)), J = (y + f(y/4) + I + 2 - C + f(C/4)) % 7, L = I - J, m = 3 + f((L+40)/44), d = L + 28 - 31*f(m/4);
            return { m: m - 1, d: d };
        };

        const isHoliday = (d, m, y) => {
            const fixed = ["1-0", "6-0", "20-0", "25-3", "1-4", "2-5", "15-7", "4-9", "1-10", "8-11", "25-11", "26-11"];
            if (fixed.includes(d + '-' + m)) return true;
            const e = getEaster(y); if (d === e.d && m === e.m) return true;
            const mon = new Date(y, e.m, e.d + 1); return (d === mon.getDate() && m === mon.getMonth());
        };

        const isFestive = (ds) => {
            const [y, m, d] = ds.split('-').map(Number);
            return isHoliday(d, m - 1, y) || (new Date(y, m - 1, d).getDay() === 0);
        };

        function moveMonth(delta) { 
            let mSelect = document.getElementById("monthSelect");
            let ySelect = document.getElementById("yearSelect");
            let d = new Date(state.year, state.month + delta, 1); 
            state.month = d.getMonth(); state.year = d.getFullYear();
            mSelect.value = state.month; ySelect.value = state.year;
            renderCalendar(); 
        }

        function renderCalendar() {
            const mSelect = document.getElementById('monthSelect');
            const ySelect = document.getElementById('yearSelect');
            if (mSelect && mSelect.value) state.month = parseInt(mSelect.value);
            if (ySelect && ySelect.value) state.year = parseInt(ySelect.value);
            
            const days = new Date(state.year, state.month + 1, 0).getDate();
            let h1 = "<tr><th class='staff-name'>GIORNO</th>", h2 = "<tr><th class='staff-name'>SETT.</th>";
            for(let d=1; d<=days; d++) {
                const date = new Date(state.year, state.month, d);
                const ds = `${state.year}-${(state.month+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                const cls = isFestive(ds) ? "fest" : (date.getDay() === 6 ? "sat" : "");
                h1 += `<th>${d}</th>`; h2 += `<th class='${cls}'>${["D","L","M","M","G","V","S"][date.getDay()]}</th>`;
            }
            document.getElementById('calHead').innerHTML = h1 + "</tr>" + h2 + "</tr>";

            let bodyHtml = "";
            STAFF.forEach(name => {
                bodyHtml += `<tr><td class='staff-name'>${name}</td>`;
                for(let d=1; d<=days; d++) {
                    const ds = `${state.year}-${(state.month+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                    const val = (state.shifts[ds] && state.shifts[ds][name]) || '—';
                    const isMod = state.originalShifts[ds] && state.originalShifts[ds][name] && state.originalShifts[ds][name] !== val;
                    
                    const pendingReq = state.pendingRequests.find(r => r.user === name && r.date === ds);
                    const cellVal = pendingReq ? pendingReq.to : val;
                    const pendingIndicator = pendingReq ? `<div class="pending-request" title="In attesa di approvazione"></div>` : "";
                    
                    let optHtml = `<option value=''>Scegli...</option>`;
                    OPTIONS.forEach(o => optHtml += `<option value='${o}'>${o}</option>`);
                    
                    const canEdit = isAdmin || currentUser === name;
                    const selectHtml = canEdit ? `<select class='service-select' onchange='requestChange("${name}","${ds}", this.value, "${val}")'>${optHtml}</select>` : "";
                    
                    bodyHtml += `<td class='service-cell ${canEdit ? 'editable-cell' : ''} ${isMod ? 'modified' : ''} ${pendingReq ? 'modified' : ''}' style="${pendingReq ? 'border-color: var(--bronzo); color: var(--bronzo) !important;' : ''}">${cellVal}${pendingIndicator}${selectHtml}</td>`;
                }
                bodyHtml += "</tr>";
            });
            document.getElementById('calBody').innerHTML = bodyHtml || "<tr><td colspan='32'>Nessun dato caricato</td></tr>";
            renderStats();
            persistData();
        }

        async function persistData() {
            localStorage.setItem('p_staff', JSON.stringify(STAFF)); 
            localStorage.setItem('p_shifts', JSON.stringify(state.shifts)); 
            localStorage.setItem('p_history', JSON.stringify(state.history));
            localStorage.setItem('p_pending', JSON.stringify(state.pendingRequests));
            localStorage.setItem('p_email', JSON.stringify(state.emailConfig));
            localStorage.setItem('p_roles', JSON.stringify(state.userRoles));
            try {
                if (isAdmin) {
                    await _supabase.from('shifts').upsert({ id: 1, data: state.shifts });
                    await _supabase.from('profiles').upsert({ id: 1, data: STAFF });
                }
                await _supabase.from('requests').upsert({ id: 1, data: { history: state.history, pending: state.pendingRequests, emailConfig: state.emailConfig, userRoles: state.userRoles } });
                console.log("Sincronizzazione cloud completata.");
            } catch (e) { console.error("Errore sincronizzazione cloud:", e); }
        }

        function renderStats() {
            const stats = {}; STAFF.forEach(u => stats[u] = { m: {repFer:0, repFest:0, cfi:0, lic:0, mix:0, rm:0}, y: {repFer:0, repFest:0, cfi:0, lic:0, mix:0, rm:0} });
            for (let ds in state.shifts) {
                const parts = ds.split('-').map(Number), y = parts[0], m = parts[1] - 1;
                if (y !== state.year) continue;
                const festive = isFestive(ds), isM = (m === state.month);
                for (let u in state.shifts[ds]) {
                    if (!stats[u]) continue;
                    const val = state.shifts[ds][u]; if (!val || val === '—') continue;
                    const up = (s) => {
                        if (val === 'REP' || val === 'REPF') { if(festive) s.repFest++; else s.repFer++; }
                        else if (val === 'CFI' || val === 'CFI/REP') s.cfi += (festive ? 2 : 1);
                        else if (val === 'LIC' || val === 'L.O.') { if(!festive) s.lic++; }
                        else if (val === 'MIX') s.mix++; else if (val === 'RM') s.rm++;
                    };
                    up(stats[u].y); if (isM) up(stats[u].m);
                }
            }
            let html = "<table class='stats-table'><thead><tr><th>Operatore</th><th>REP (f/F)</th><th>CFI</th><th>LIC/L.O.</th><th>MIX</th><th>RM</th></tr></thead><tbody>";
            STAFF.forEach(u => {
                const s = stats[u];
                html += `<tr><td>${u}</td><td><span class='val-month'>${s.m.repFer}f / ${s.m.repFest}F</span><span class='val-year'>(${s.y.repFer}/${s.y.repFest})</span></td><td><span class='val-month'>${s.m.cfi}</span><span class='val-year'>(${s.y.cfi})</span></td><td><span class='val-month'>${s.m.lic}</span><span class='val-year'>(${s.y.lic})</span></td><td><span class='val-month'>${s.m.mix}</span><span class='val-year'>(${s.y.mix})</span></td><td><span class='val-month'>${s.m.rm}</span><span class='val-year'>(${s.y.rm})</span></td></tr>`;
            });
            document.getElementById('statsBody').innerHTML = html + "</tbody></table>";
        }

        async function requestChange(u, d, v, currentVal) {
            if(!v) return;
            if (v === 'REP' || v === 'REPF') {
                const monthStr = d.substring(0, 7);
                let fer = 0, fest = 0;
                for (let ds in state.shifts) { if (ds.startsWith(monthStr) && ds !== d && (state.shifts[ds][u] === 'REP' || state.shifts[ds][u] === 'REPF')) { if (isFestive(ds)) fest++; else fer++; } }
                if (isFestive(d)) fest++; else fer++;
                if (fer > 6 || fest > 2) { alert(`Limite superato per ${u}`); renderCalendar(); return; }
            }
            if(isAdmin) {
                try {
                    const { data: sData } = await _supabase.from('shifts').select('*').single();
                    if (sData && sData.data) state.shifts = sData.data;
                } catch (e) { console.warn("Errore recupero turni:", e); }

                if(!state.shifts[d]) state.shifts[d] = {};
                state.history.push({ user: u, date: d, from: currentVal || '—', to: v, timestamp: new Date().toLocaleString(), by: 'Admin' });
                state.shifts[d][u] = v; 
                await persistData();
            } else {
                try {
                    const { data: rData } = await _supabase.from('requests').select('*').single();
                    if (rData && rData.data) {
                        state.pendingRequests = rData.data.pending || [];
                    }
                } catch (e) { console.warn("Errore recupero richieste:", e); }

                const existingReqIndex = state.pendingRequests.findIndex(r => r.user === u && r.date === d);
                const reqObj = { id: Date.now().toString() + Math.random().toString().slice(2,6), user: u, date: d, from: currentVal || '—', to: v, timestamp: new Date().toLocaleString() };
                if(existingReqIndex >= 0) state.pendingRequests[existingReqIndex] = reqObj;
                else state.pendingRequests.push(reqObj);
                
                await persistData();
                alert(`Richiesta di modifica per il ${d} inviata all'Amministratore.`);
            }
            renderCalendar();
        }

        function generatePDF() {
            const { jsPDF } = window.jspdf; const doc = new jsPDF();
            doc.text("Audit Report", 20, 20);
            doc.save("Report.pdf");
        }

        function importExcel(input) {
            const reader = new FileReader(); 
            reader.onload = async (e) => {
                try {
                    const wb = XLSX.read(new Uint8Array(e.target.result), {type: 'array'});
                    const ws = wb.Sheets["ANNO CORRENTE"] || wb.Sheets[wb.SheetNames[0]];
                    
                    // Estrarre dinamicamente i nomi degli operatori dalle righe del file
                    const importedStaff = [];
                    for(let m=0; m<12; m++) {
                        const rowOff = 4 + (m * 8);
                        for(let s=0; s<10; s++) { // Controlla fino a 10 righe per blocco mese
                            const row = rowOff + 3 + s;
                            const nameCell = ws['A' + row];
                            if(nameCell && nameCell.v) {
                                const importedName = nameCell.v.toString().toUpperCase().trim();
                                if(importedName && importedName !== "GIORNO" && importedName !== "SETT." && !importedStaff.includes(importedName)) {
                                    importedStaff.push(importedName);
                                }
                            }
                        }
                    }

                    // Aggiungere nuovi operatori se non presenti e impostare i ruoli
                    importedStaff.forEach(name => {
                        if (!STAFF.includes(name)) {
                            STAFF.push(name);
                        }
                        if (!state.userRoles[name]) {
                            state.userRoles[name] = (name === "DI LAURO") ? "SUPERUSER" : "USER";
                        }
                    });

                    // Caricare i turni per ciascun operatore importato
                    for(let m=0; m<12; m++) {
                        const rowOff = 4 + (m * 8);
                        for(let s=0; s<importedStaff.length; s++) {
                            const staffName = importedStaff[s];
                            const row = rowOff + 3 + s;
                            for(let d=1; d<=31; d++) {
                                const cell = ws[XLSX.utils.encode_col(d) + row];
                                if(cell && cell.v) {
                                    const ds = `2026-${(m+1).toString().padStart(2,'0')}-${d.toString().padStart(2,'0')}`;
                                    const v = cell.v.toString().toUpperCase().trim();
                                    if(!state.shifts[ds]) state.shifts[ds] = {};
                                    if(!state.originalShifts[ds]) state.originalShifts[ds] = {};
                                    state.shifts[ds][staffName] = v; 
                                    state.originalShifts[ds][staffName] = v;
                                }
                            }
                        }
                    }
                    alert("Importazione completata con successo! Sincronizzazione in corso...");
                    await persistData();
                    renderCalendar();
                    toggleAdmin();
                } catch(error) {
                    console.error("Errore importazione:", error);
                    alert("Errore durante l'importazione Excel.");
                }
            };
            reader.readAsArrayBuffer(input.files[0]);
        }

        function toggleAdmin() { 
            const o = document.getElementById('adminOverlay'); 
            o.style.display = o.style.display === 'flex' ? 'none' : 'flex'; 
            if(o.style.display==='flex') { 
                renderAdminUsers(); renderAdminHistory(); renderAdminPending();
                document.getElementById('emailServiceId').value = state.emailConfig.serviceId || '';
                document.getElementById('emailTemplateId').value = state.emailConfig.templateId || '';
                document.getElementById('emailPublicKey').value = state.emailConfig.publicKey || '';
                document.getElementById('emailToAddresses').value = state.emailConfig.toEmails || '';
            } 
        }
        function switchTab(t, e) { document.querySelectorAll('.admin-content').forEach(c => c.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById(`tab-${t}`).classList.add('active'); e.target.classList.add('active'); }
        function renderAdminUsers() { 
            const l = document.getElementById('staffList'); 
            l.innerHTML = ''; 
            STAFF.forEach((n, i) => {
                const role = state.userRoles[n] || 'USER';
                const roleBadge = role === 'SUPERUSER' ? '<span style="color:var(--p); font-weight:bold; font-size:12px; margin-left:10px;">(SuperUser)</span>' : '<span style="color:#94a3b8; font-size:12px; margin-left:10px;">(User)</span>';
                l.innerHTML += `<div class='admin-list-item'>
                    <div><strong>${n}</strong> ${roleBadge}</div>
                    <div>
                        <button onclick='toggleUserRole("${n}")' style="padding:6px 12px; font-size:12px; background:rgba(255,255,255,0.05); margin-right:5px; border-radius:8px; cursor:pointer;">Ruolo</button>
                        <button onclick='removeUser(${i})'>🗑️</button>
                    </div>
                </div>`;
            }); 
        }
        function toggleUserRole(name) {
            if(!state.userRoles[name]) state.userRoles[name] = 'USER';
            state.userRoles[name] = state.userRoles[name] === 'SUPERUSER' ? 'USER' : 'SUPERUSER';
            persistData();
            renderAdminUsers();
        }
        function renderAdminHistory() { const l = document.getElementById('historyList'); l.innerHTML = ''; state.history.forEach(h => l.innerHTML += `<div class='history-row'>[${h.timestamp}] ${h.user}: ${h.date} | ${h.from} -> ${h.to} ${h.by ? '(Admin)' : '(Approvato)'}</div>`); }
        function renderAdminPending() {
            const l = document.getElementById('pendingRequestsList'); l.innerHTML = '';
            if(state.pendingRequests.length === 0) { l.innerHTML = '<div style="padding:15px; color:#94a3b8;">Nessuna richiesta in attesa.</div>'; return; }
            state.pendingRequests.forEach(r => {
                l.innerHTML += `<div class='admin-list-item' style="align-items: flex-start; flex-direction: column; gap: 10px;">
                    <div style="width: 100%;"><strong>${r.user}</strong>: ${r.date} (${r.from} &rarr; <strong>${r.to}</strong>)<br><small style="color:#64748b;">${r.timestamp}</small></div>
                    <div style="align-self: flex-end;"><button class='admin-btn-action btn-approve' onclick='approveReq("${r.id}")'>Approva</button><button class='admin-btn-action btn-reject' onclick='rejectReq("${r.id}")'>Rifiuta</button></div>
                </div>`;
            });
        }
        async function approveReq(id) {
            try {
                const { data: rData } = await _supabase.from('requests').select('*').single();
                if (rData && rData.data) {
                    state.pendingRequests = rData.data.pending || [];
                    state.history = rData.data.history || [];
                }
            } catch (e) { console.warn("Errore recupero richieste:", e); }

            const reqIdx = state.pendingRequests.findIndex(r => r.id === id);
            if(reqIdx === -1) return alert("Richiesta non trovata o già gestita.");
            const req = state.pendingRequests[reqIdx];
            
            try {
                const { data: sData } = await _supabase.from('shifts').select('*').single();
                if (sData && sData.data) state.shifts = sData.data;
            } catch (e) { console.warn("Errore recupero turni:", e); }

            if(!state.shifts[req.date]) state.shifts[req.date] = {};
            state.shifts[req.date][req.user] = req.to;
            state.history.push({ user: req.user, date: req.date, from: req.from, to: req.to, timestamp: new Date().toLocaleString() });
            state.pendingRequests.splice(reqIdx, 1);
            
            await persistData();
            generateAndSendReport(req);
            renderAdminPending(); renderCalendar();
        }
        async function rejectReq(id) {
            try {
                const { data: rData } = await _supabase.from('requests').select('*').single();
                if (rData && rData.data) {
                    state.pendingRequests = rData.data.pending || [];
                }
            } catch (e) { console.warn("Errore recupero richieste:", e); }

            state.pendingRequests = state.pendingRequests.filter(r => r.id !== id);
            await persistData();
            renderAdminPending(); renderCalendar();
        }
        function saveEmailConfig() {
            state.emailConfig = {
                serviceId: document.getElementById('emailServiceId').value.trim(),
                templateId: document.getElementById('emailTemplateId').value.trim(),
                publicKey: document.getElementById('emailPublicKey').value.trim(),
                toEmails: document.getElementById('emailToAddresses').value.trim()
            };
            persistData();
            alert("Configurazione Email salvata!");
        }
        function addUser() { 
            const n = prompt("Nome:"); 
            if(n) { 
                const name = n.toUpperCase().trim();
                if(!STAFF.includes(name)) {
                    STAFF.push(name); 
                    state.userRoles[name] = (name === "DI LAURO") ? "SUPERUSER" : "USER";
                    persistData();
                    renderAdminUsers(); 
                    renderCalendar(); 
                }
            } 
        }
        function removeUser(i) { 
            const name = STAFF[i];
            STAFF.splice(i, 1); 
            if(state.userRoles[name]) delete state.userRoles[name];
            persistData();
            renderAdminUsers(); 
            renderCalendar(); 
        }

        function generateAndSendReport(req) {
            if(!state.emailConfig.serviceId || !state.emailConfig.templateId || !state.emailConfig.publicKey || !state.emailConfig.toEmails) {
                console.warn("Configurazione EmailJS incompleta. PDF generato ma non inviato.");
                return;
            }
            emailjs.init(state.emailConfig.publicKey);
            
            const { jsPDF } = window.jspdf; 
            const doc = new jsPDF();
            doc.setFont("helvetica", "bold"); doc.setFontSize(20);
            doc.text("Report Modifica Turno", 20, 20);
            doc.setFont("helvetica", "normal"); doc.setFontSize(12);
            doc.text(`Data Approvazione: ${new Date().toLocaleString()}`, 20, 30);
            doc.text(`Utente: ${req.user}`, 20, 40);
            doc.text(`Data Turno Interessata: ${req.date}`, 20, 50);
            doc.text(`Modifica: da ${req.from} a ${req.to}`, 20, 60);
            doc.text("Stato: APPROVATO", 20, 70);
            
            const pdfBase64 = doc.output('datauristring');
            const params = {
                to_emails: state.emailConfig.toEmails,
                user_name: req.user,
                shift_date: req.date,
                modification: `${req.from} -> ${req.to}`,
                content: pdfBase64,
                message: `L'utente ${req.user} ha una modifica approvata per il giorno ${req.date}. Tipo: ${req.from} -> ${req.to}`
            };
            
            emailjs.send(state.emailConfig.serviceId, state.emailConfig.templateId, params)
                .then(() => alert(`Report inviato con successo per ${req.user}`))
                .catch(err => { console.error("Errore invio email:", err); alert("Errore durante l'invio della mail. Controlla le configurazioni EmailJS."); });
        }

        function populateLoginUsers() {
            const select = document.getElementById('loginUserSelect');
            select.innerHTML = '<option value="">Seleziona il tuo nome...</option><option value="ADMIN">⚙️ Amministratore</option>';
            STAFF.forEach(u => select.innerHTML += `<option value="${u}">${u}</option>`);
        }

        async function init() {
            const mSelect = document.getElementById('monthSelect');
            const ySelect = document.getElementById('yearSelect');
            MONTHS.forEach((m, i) => mSelect.innerHTML += `<option value='${i}'>${m}</option>`);
            for(let i=2024; i<=2030; i++) ySelect.innerHTML += `<option value='${i}'>${i}</option>`;
            mSelect.value = state.month; ySelect.value = state.year;

            // Carica da LocalStorage subito
            const sStaff = localStorage.getItem('p_staff'); if(sStaff) STAFF = JSON.parse(sStaff);
            state.shifts = JSON.parse(localStorage.getItem('p_shifts') || '{}');
            state.history = JSON.parse(localStorage.getItem('p_history') || '[]');
            state.pendingRequests = JSON.parse(localStorage.getItem('p_pending') || '[]');
            state.emailConfig = JSON.parse(localStorage.getItem('p_email') || '{"serviceId":"","templateId":"","publicKey":"","toEmails":""}');
            state.userRoles = JSON.parse(localStorage.getItem('p_roles') || '{"DI LAURO":"SUPERUSER","BASILICA":"USER","CARANGIO":"USER","DATTEO":"USER"}');

            populateLoginUsers();

            // renderCalendar() verrà richiamato dopo il login
            renderCalendar();

            // Poi tenta Cloud
            try {
                const { data: pData } = await _supabase.from('profiles').select('*').single();
                if(pData && pData.data) { STAFF = pData.data; populateLoginUsers(); }
                const { data: sData } = await _supabase.from('shifts').select('*').single();
                if(sData && sData.data) state.shifts = sData.data;
                const { data: rData } = await _supabase.from('requests').select('*').single();
                if(rData && rData.data) {
                    if(Array.isArray(rData.data)) state.history = rData.data; // backward compatibility
                    else {
                        state.history = rData.data.history || [];
                        state.pendingRequests = rData.data.pending || [];
                        state.emailConfig = rData.data.emailConfig || state.emailConfig;
                        state.userRoles = rData.data.userRoles || state.userRoles;
                    }
                }
            } catch(e) { console.warn("Cloud load skip", e); }
        }
        init();
    </script>
